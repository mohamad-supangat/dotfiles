# =============================================================================
# INITIALIZATION
# =============================================================================

# Install TPM if not exists
if "test ! -d ~/.tmux/plugins/tpm" \
   "run 'git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm && ~/.tmux/plugins/tpm/bin/install_plugins'"

# =============================================================================
# TERMINAL SETUP
# =============================================================================

# Terminal capabilities
set -as terminal-features ",xterm-256color:hyperlinks"
set -as terminal-overrides ",*:Tc"
set -as terminal-overrides '*:Ss=\E[%p1%d q:Se=\E[ q'

# Undercurl support (needs tmux >= 3.0)
set -as terminal-overrides ',*:Smulx=\E[4::%p1%dm'
set -as terminal-overrides ',*:Setulc=\E[58::2::%p1%{65536}%/%d::%p1%{256}%/%{255}%&%d::%p1%{255}%&%d%;m'

# =============================================================================
# GENERAL OPTIONS
# =============================================================================

# Mouse & clipboard
set -g mouse on
set-option -g set-clipboard on

# Performance
set -g escape-time 0
set -g focus-events on
set -g status-interval 5

# History
set -g history-limit 100000
set -g history-file ~/.tmux/log/tmuxhistory

# Bell & activity
set -g monitor-activity off
set -g visual-activity off
setw -g monitor-bell off
set -g bell-action none

# Status bar position
set-option -g status-position bottom

# =============================================================================
# SIMPLE THEME - TRANSPARENT BACKGROUND & ACTIVE TAB HIGHLIGHT
# =============================================================================

# Transparent status bar background
set -g status-style "bg=default, fg=white"

# Window status (inactive)
set -g window-status-style "bg=default, fg=gray"
set -g window-status-format " #I #W "

# Window status (active) - highlighted with color
set -g window-status-current-style "fg=black, bg=cyan, bold"
set -g window-status-current-format " #I #W "

# Window status (activity/bell)
set -g window-status-activity-style "fg=yellow, bg=default"

# Status left (session name)
set -g status-left-style "bg=default, fg=cyan, bold"
set -g status-left-length 40
set -g status-left "#S "
set -g status-justify absolute-centre

# Status right (system info)
set -g status-right-style "bg=default, fg=gray"
set -g status-right-length 80
# set -g status-right "#{prefix_highlight} | %H:%M | %d-%b-%y"

# Pane border (inactive)
set -g pane-border-style "fg=gray, bg=default"

# Pane border (active)
set -g pane-active-border-style "fg=cyan, bg=default"

# Message style
set -g message-style "fg=cyan, bg=default"

# Command message style
set -g message-command-style "fg=cyan, bg=default"

# Mode style (copy mode)
set -g mode-style "fg=black, bg=cyan"

# =============================================================================
# WINDOW & PANE SETTINGS
# =============================================================================

# Window numbering
set -g base-index 1
set -g renumber-windows on
set -g automatic-rename on

# Window title
set -g set-titles on
set -g set-titles-string "#{b:pane_current_path} - #{pane_current_command}"
setw -g allow-rename on

# Mode settings
setw -g mode-keys vi
setw -g wrap-search off

# =============================================================================
# PLUGINS (TPM)
# =============================================================================

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'nhdaly/tmux-better-mouse-mode'
set -g @plugin 'jaclu/tmux-menus'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-open'
set -g @plugin 'mrjones2014/smart-splits.nvim'
set -g @plugin 'tmux-plugins/tmux-prefix-highlight'  # Optional: shows when prefix is pressed

# Plugin configurations
set -g @menus_trigger 'F9'
set -g @menus_without_prefix 1

# Smart splits configuration
set -g @smart-splits_no_wrap ''
set -g @smart-splits_move_left_key  'C-h'
set -g @smart-splits_move_down_key  'C-j'
set -g @smart-splits_move_up_key    'C-k'
set -g @smart-splits_move_right_key 'C-l'
set -g @smart-splits_resize_left_key  'M-h'
set -g @smart-splits_resize_down_key  'M-j'
set -g @smart-splits_resize_up_key    'M-k'
set -g @smart-splits_resize_right_key 'M-l'
set -g @smart-splits_resize_step_size '3'

# Popup style
set -gw popup-border-style fg=brightblack
set -gw popup-border-lines rounded

# =============================================================================
# KEY BINDINGS
# =============================================================================

# Reload configuration
bind-key r source-file ~/.tmux.conf \; display-message "~/.tmux.conf reloaded"

# Split panes with same directory
unbind-key '"'
unbind-key %
bind-key v split-window -h -c "#{pane_current_path}"
bind-key b split-window -v -c "#{pane_current_path}"

# Paste buffer
bind P paste-buffer

# Move windows with Ctrl+Shift+Left/Right
bind-key -n C-S-Left swap-window -t -1
bind-key -n C-S-Right swap-window -t +1

# Resize panes (fallback)
bind-key C-h resize-pane -L 10
bind-key C-l resize-pane -R 10
bind-key C-j resize-pane -D 10
bind-key C-k resize-pane -U 10

# Switch windows with Alt+Number
bind-key -n M-1 select-window -t 1
bind-key -n M-2 select-window -t 2
bind-key -n M-3 select-window -t 3
bind-key -n M-4 select-window -t 4
bind-key -n M-5 select-window -t 5
bind-key -n M-6 select-window -t 6
bind-key -n M-7 select-window -t 7
bind-key -n M-8 select-window -t 8
bind-key -n M-9 select-window -t 9

# Copy mode bindings
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X rectangle-toggle
unbind -T copy-mode-vi Enter

# =============================================================================
# POPUP SESSIONS
# =============================================================================

# OpenCode popup session
# bind-key -n M-b if "echo \"#{session_name}\" | grep -vq \"opencode\"" {
#     display-popup -E -x C -w 82 -h 100% "tmux new-session -A -s opencode -d opencode"
# } {
#     detach-client
# }

# Matcha popup session
bind-key -n M-m if "echo \"#{session_name}\" | grep -vq \"matcha\"" {
    display-popup -E -x C -w 82% -h 100% "tmux new-session -A -s matcha -d matcha"
} {
    detach-client
}

# =============================================================================
# TPM
# =============================================================================

run '~/.tmux/plugins/tpm/tpm'
